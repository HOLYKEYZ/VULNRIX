services:
  # Django Backend API
  - type: web
    name: vulnrix-api
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn digitalshield.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --max-requests 50 --max-requests-jitter 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: 'false'
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: '2'
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_KEY
        sync: false

  # Next.js Frontend (TypeScript + Tailwind + shadcn)
  - type: web
    name: vulnrix-frontend
    runtime: node
    buildCommand: cd frontend && npm install -g pnpm && pnpm install && pnpm run build
    startCommand: cd frontend && pnpm start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: NEXT_PUBLIC_API_URL
        value: https://vulnrix-api.onrender.com
      - key: NEXT_PUBLIC_SITE_URL
        value: https://vulnrix-frontend.onrender.com
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
